<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zigtools Playground</title>

    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <main>
        <div id="split-pane" style="--editor-height-percent: 100%;">
            <div id="editor-container">
                <div id="tabs-bar">
                    <div id="tabs"></div>
                    <button id="add-file" title="Add new file">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M14 7H9V2H7V7H2V9H7V14H9V9H14V7Z" />
                        </svg>
                    </button>
                    <button id="run">
                        <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M3.5 2.5v11l10-5.5z" />
                        </svg>
                        Run
                    </button>
                </div>
                <div id="editor"></div>
            </div>
            <div id="resize-bar"></div>
            <div id="output"></div>
        </div>
    </main>

    <footer>
        <h1><a href="https://playground.zigtools.org">playground</a></h1>
        <span><span id="warning">Warning</span> Zig's self-hosted WebAssembly backend is still experimental!</span>
        <span>A <a href="https://zigtools.org">zigtools</a> initiative.</span>
    </footer>

    <script src="/src/editor.ts" type="module"></script>
</body>
</html>
